<!DOCTYPE html>

    <style>

            font-family: 'Gabia_Sai';

            font-style: normal;
        }
        @font-face {

<body>
    <div class="home-container" data-node-id="1:2">
        <!-- 상단 왼쪽 텍스트 블록 (링크) -->

            <p>글쓰기는 생각의 타래를 풀어내는 마법과 같습니다. 하얀 화면 위에 커서가 깜빡일 때, 우리는 어떤 단어로 채워 나갈지 고민하곤 합니다. 거창한 주제가 아니어도 괜찮습니다. 지금 이 순간 머릿속을 스쳐 지나가는 짧은 느낌이나 눈앞의 풍경을 그대로 옮겨 적는 것만으로도 훌륭한 문장이 됩니다. 쓰기 시작하면 비로소 새로운 생각이 시작됩니다.</p>
        </a>

        <!-- 중앙/우측 텍스트 "abcd" -->

        <!-- 이미지 영역 -->

            <div class="effect" data-node-id="2:6">
