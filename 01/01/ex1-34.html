<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>div</title>
    <!-- 웹표준 html5, css3, es6 -->
    <style>
      .wrap {
        width: 300px;
        margin: auto;
        background-color: lavenderblush;
      }
      footer,
      section,
      header {
        border: 1px solid; 
      }
    </style>
  </head>
  <body>
    <!-- header+section+footer -->
    <!-- .,# 태그의 식별용 속성 두가지, id=기능용, class=디자인용 div=그룹을 표시하는 태그 -->
    <div class="wrap">
      <header>헤더</header>
      <section>
        <h2>semantic 태그</h2>
        섹션
      </section>
      <footer>푸터</footer>
    </div>
  </body>
</html>
